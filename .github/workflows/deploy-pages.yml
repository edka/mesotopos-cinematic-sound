name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Prepare static output
        run: |
          test -f dist/client/index.html
          cp .github/CNAME dist/client/CNAME
          touch dist/client/.nojekyll

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/client
          cname: mesotoposmusic.com

      - name: Pages source reminder
        run: |
          echo "::warning::If mesotoposmusic.com returns 404, set Settings → Pages → Deploy from branch → gh-pages → / (root). Do not use main."
